services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: cranberry-backend
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cranberry-frontend
    depends_on:
      - backend
    ports:
      - "80:80"
    restart: unless-stopped

